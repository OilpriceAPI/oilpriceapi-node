name: Test Node SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npx tsc --noEmit

      - name: Canonical snippet type check
        run: npx tsc --noEmit -p tsconfig.snippets.json

      - name: Check for hardcoded API keys
        run: npm run check:secrets

      - name: Validate public storefront claims
        run: npm run storefront:check

      - name: ESLint
        run: npx eslint src/

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build executable snippet manifest
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: npm run snippets:build -- --source-commit "$SOURCE_COMMIT"

      - name: Upload snippet manifest
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v7
        with:
          name: oilpriceapi-node-snippets-${{ github.sha }}
          path: artifacts/snippets/
          if-no-files-found: error

  node18-snippets:
    name: Executable snippets (Node 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 18
        uses: actions/setup-node@v7
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build SDK and validate exact snippet files
        run: |
          npm run build
          npx tsc --noEmit -p tsconfig.snippets.json
          npm run snippets:fixtures
          npm run snippets:build -- --source-commit "$GITHUB_SHA"
